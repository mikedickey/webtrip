name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/mikedickey/webtrip-build

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Rebuild the build container when its inputs change; otherwise reuse the
  # cached image tagged with the fingerprint of those inputs.
  # ──────────────────────────────────────────────────────────────────────────
  container:
    name: Build container (if needed)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.fingerprint.outputs.ref }}

    steps:
      - uses: actions/checkout@v4

      # Files that, when changed, require a new container image.
      - name: Compute container fingerprint
        id: fingerprint
        run: |
          tag=sha-$(cat containers/build/Containerfile Cargo.toml Cargo.lock package.json \
                    | sha256sum | cut -c1-16)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=${{ env.IMAGE }}:$tag" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether image already exists
        id: exists
        run: |
          docker manifest inspect "${{ steps.fingerprint.outputs.ref }}" 2>/dev/null \
            && echo "hit=true"  >> "$GITHUB_OUTPUT" \
            || echo "hit=false" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.exists.outputs.hit == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.exists.outputs.hit == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/build/Containerfile
          push: true
          tags: |
            ${{ steps.fingerprint.outputs.ref }}
            ${{ env.IMAGE }}:latest

  # ──────────────────────────────────────────────────────────────────────────
  # Build WASM + TypeScript inside the build container.
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    container:
      image: ${{ needs.container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
      - run: npm run test
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: npm run coverage
      - run: npm run test:wasm
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          use_oidc: true
          fail_ci_if_error: true
