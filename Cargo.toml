[package]
authors = ["The wasm-bindgen Developers"]
edition = "2021"
name = "wasm-audio-worklet"
publish = false
version = "0.0.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
console_error_panic_hook = "0.1.7"
js-sys = "0.3.83"
wasm-bindgen = "0.2.106"
wasm-bindgen-futures = "0.4.56"
web-sys = { version = "0.3.83", features = [
  # AudioContext and worklet
  "AudioContext",
  "AudioContextOptions",
  "AudioDestinationNode",
  "AudioNode",
  "AudioWorklet",
  "AudioWorkletNode",
  "AudioWorkletNodeOptions",
  "ChannelCountMode",
  "MessagePort",
  
  # MediaDevices API
  "MediaDeviceInfo",
  "MediaDeviceKind",
  "MediaDevices",
  "MediaStream",
  "MediaStreamAudioSourceNode",
  "MediaStreamConstraints",
  "MediaStreamTrack",
  
  # For dependent_module (worklet.js loading)
  "Blob",
  "BlobPropertyBag",
  "Url",
  
  # Browser APIs
  "Navigator",
  "Window",
] }
